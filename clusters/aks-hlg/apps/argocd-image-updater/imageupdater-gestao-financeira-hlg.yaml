apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: gestao-financeira-hlg
  namespace: argocd
spec:
  # Namespace where Argo CD Applications live
  namespace: argocd

  # Write back changes to Git (required for ApplicationSet-managed Applications)
  writeBackConfig:
    # Requires a git credentials secret to exist (see notes in README/runbook)
    method: "git:secret:argocd/argocd-image-updater-git-creds"
    gitConfig:
      branch: "main"
      writeBackTarget: "kustomization"

  applicationRefs:
    - namePattern: "gestao-financeira-hlg*"
      images:
        - alias: "app"
          imageName: "ghcr.io/jgpjuniorj/gestao-financeira-hlg"
          manifestTargets:
            kustomize:
              # Must match the image name in kustomization.yaml `images[].name`
              name: "ghcr.io/jgpjuniorj/gestao-financeira-hlg"
          commonUpdateSettings:
            # We publish images with immutable tags (commit SHA), so pick the newest build.
            updateStrategy: "newest-build"
            # Only allow full commit SHA tags; ignore 'latest', 'main', '1', etc.
            allowTags: "regexp:^[0-9a-f]{40}$"

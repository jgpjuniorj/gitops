apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aks-prd-appsets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/sua-org/gitops.git
    targetRevision: main
    path: applicationsets/prd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy: {}


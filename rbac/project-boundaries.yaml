apiVersion: v1
kind: ConfigMap
metadata:
  name: gitops-project-boundaries
  namespace: argocd
data:
  notes.md: |
    Sugestões de boundaries para AppProjects (ajuste conforme necessário):

    - Restrinja `sourceRepos` para repos confiáveis.
    - Em produção, restrinja `destinations` para namespaces explícitos.
    - Use `clusterResourceWhitelist` mínimo possível.
    - Crie `roles` no AppProject para times (somente leitura vs sync).
